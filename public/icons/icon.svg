<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="96" fill="#0f172a"/>
  <rect x="24" y="24" width="464" height="464" rx="80" fill="#0d9488"/>
  <g transform="translate(256,256)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="160" fill="white" opacity="0.15"/>
    <!-- Dollar sign -->
    <text x="0" y="24" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="200" font-weight="800" fill="white">$</text>
    <!-- Gear accent -->
    <circle cx="0" cy="-60" r="8" fill="#0f172a" opacity="0.3"/>
    <circle cx="53" cy="-30" r="8" fill="#0f172a" opacity="0.3"/>
    <circle cx="53" cy="30" r="8" fill="#0f172a" opacity="0.3"/>
    <circle cx="0" cy="60" r="8" fill="#0f172a" opacity="0.3"/>
    <circle cx="-53" cy="30" r="8" fill="#0f172a" opacity="0.3"/>
    <circle cx="-53" cy="-30" r="8" fill="#0f172a" opacity="0.3"/>
  </g>
  <!-- Chart bars at bottom -->
  <g transform="translate(256, 400)" opacity="0.9">
    <rect x="-80" y="-40" width="30" height="40" rx="4" fill="white" opacity="0.7"/>
    <rect x="-35" y="-60" width="30" height="60" rx="4" fill="white" opacity="0.85"/>
    <rect x="10" y="-30" width="30" height="30" rx="4" fill="white" opacity="0.6"/>
    <rect x="55" y="-50" width="30" height="50" rx="4" fill="white" opacity="0.8"/>
  </g>
</svg>
